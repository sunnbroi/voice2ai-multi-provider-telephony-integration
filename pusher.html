<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Soketi Draw Test</title>
    <script src="https://js.pusher.com/7.2/pusher.min.js"></script>
</head>
<body>
<h1>Draw Test</h1>
<button onclick="sendDraw()">Send Draw Event</button>

<script>
    // Настройка клиента
    const pusher = new Pusher('app-key', {
        wsHost: 'localhost',
        wsPort: 6001,
        forceTLS: false,
        enabledTransports: ['ws'],
        disableStats: true,
        authEndpoint: 'http://localhost:8813/api/broadcasting/auth',
        auth: {
            headers: {
                'X-Device-ID': '123' // сюда подставляется ID устройства
            }
        }
    });

    const channel = pusher.subscribe('presence-room.0196a573-c3f0-72df-a1e9-7c5c5e4be8d9');

    channel.bind('pusher:subscription_succeeded', (members) => {
        console.log('Subscribed! Members:', members);
    });

    channel.bind('client-draw', (data) => {
        console.log('Draw event received:', data);
    });

    function sendDraw() {
        channel.trigger('client-draw', {
            x: Math.floor(Math.random() * 400),
            y: Math.floor(Math.random() * 400),
            color: '#'+Math.floor(Math.random()*16777215).toString(16)
        });
    }
</script>
</body>
</html>
